<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7nax7na System</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      overflow-x: hidden;
    }

    /* VIDEO BACKGROUND */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* DARK OVERLAY */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    /* GLASS EFFECT */
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* ERROR MESSAGE */
    #error {
      color: #ff4d4f;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body class="text-white">

  <!-- VIDEO -->
  <video autoplay muted loop playsinline class="video-bg">
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- HEADER -->
  <header class="flex justify-between items-center p-6 glass">
    <div class="flex items-center gap-3">
      <img 
        src="https://images-ext-1.discordapp.net/external/uP9p6RG2vF0SimOB5MoNbWvpw35wXLqHdA-nDDr4dec/%3Fsize%3D1024/https/cdn.discordapp.com/icons/1479508830420336703/366f3f6ac8a9544d88f041756e1eeec9.png?format=webp&quality=lossless"
        class="w-12 h-12 rounded-full">
      <h1 class="text-2xl font-bold">7nax7na System</h1>
    </div>

    <!-- LOGIN -->
    <a href="/auth/discord"
      class="px-4 py-2 rounded glass hover:bg-white/20 transition">
      Login with Discord
    </a>
  </header>

  <!-- HERO -->
  <section class="text-center py-40 px-4">
    <h2 class="text-5xl font-bold mb-6 drop-shadow-lg">
      𝐖𝐞𝐥𝐜𝐨𝐦𝐞 𝐭𝐨 𝐨𝐮𝐫 𝐬𝐞𝐫𝐯𝐞𝐫 𝐰𝐞𝐛𝐬𝐢𝐭𝐞
    </h2>

    <p class="text-lg text-gray-200 mb-10 drop-shadow">
      𝐓𝐡𝐢𝐬 𝐰𝐞𝐛𝐬𝐢𝐭𝐞 𝐰𝐚𝐬 𝐜𝐫𝐞𝐚𝐭𝐞𝐝 𝐛𝐲 𝐝𝐞𝐯𝐞𝐥𝐨𝐩𝐞𝐫 𝟎𝟎𝟏𝐱𝐭𝐨𝐮𝐧𝐢
    </p>

    <!-- BUTTONS -->
    <div class="flex flex-col items-center gap-4">

      <!-- ADD BOT -->
      <a href="https://discord.com/oauth2/authorize?client_id=1486022873821876224&scope=bot&permissions=8"
         class="px-8 py-4 text-lg rounded glass hover:bg-white/20 transition">
         أضف البوت الآن
      </a>

      <!-- DASHBOARD -->
      <button onclick="goDashboard()"
         class="px-8 py-4 text-lg rounded glass hover:bg-white/20 transition">
         لوحة التحكم
      </button>

      <!-- ERROR MESSAGE -->
      <p id="error">❌ لازم تسجل الدخول أولاً!</p>

    </div>
  </section>

  <!-- SUPPORT -->
  <section class="py-20 px-6 text-center">
    <div class="p-6 rounded glass inline-block">
      <h3 class="text-xl font-bold mb-2">💬 دعم مباشر</h3>
      <p>فريق الدعم متوفر دائماً لمساعدتك</p>

      <a href="https://discord.gg/rcgdEMWHv8"
         class="inline-block mt-4 px-4 py-2 rounded glass hover:bg-white/20 transition">
         دخول سيرفر الدعم
      </a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="p-6 text-center glass mt-10">
    <p>© 7nax7na System by developer 001</p>
  </footer>

  <script>
    function goDashboard() {
      // نحاول ندخل للـ dashboard
      fetch('/check-session')
        .then(res => res.json())
        .then(data => {
          if (data.loggedIn) {
            window.location.href = '/dashboard';
          } else {
            document.getElementById('error').style.display = 'block';
          }
        });
    }
  </script>

</body>
</html>
