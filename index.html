<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7nax7na System</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      overflow-x: hidden;
    }

    /* Video Background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Glass effect */
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
  </style>
</head>

<body class="text-white">

  <!-- VIDEO BACKGROUND -->
  <video autoplay muted loop playsinline class="video-bg">
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- HEADER -->
  <header class="flex justify-between items-center p-6 glass">
    
    <div class="flex items-center gap-3">
      <img 
        src="https://images-ext-1.discordapp.net/external/uP9p6RG2vF0SimOB5MoNbWvpw35wXLqHdA-nDDr4dec/%3Fsize%3D1024/https/cdn.discordapp.com/icons/1479508830420336703/366f3f6ac8a9544d88f041756e1eeec9.png?format=webp&quality=lossless"
        class="w-12 h-12 rounded-full">
      <h1 class="text-2xl font-bold">7nax7na System</h1>
    </div>

    <a href="/dashboard"
       class="px-4 py-2 rounded glass hover:bg-white/20 transition">
       لوحة التحكم
    </a>

  </header>

  <!-- HERO -->
  <section class="text-center py-40 px-4">
    
    <h2 class="text-5xl font-bold mb-6 drop-shadow-lg">
      أفضل بوت Discord لسيرفرك
    </h2>

    <p class="text-lg text-gray-200 mb-10 drop-shadow">
      تحكم كامل وسهل في السيرفر مع ميزات قوية وواجهة احترافية
    </p>

    <a href="https://discord.com/oauth2/authorize?client_id=1486022873821876224&scope=bot&permissions=8"
       class="px-8 py-4 text-lg rounded glass hover:bg-white/20 transition">
       أضف البوت الآن
    </a>

  </section>

  <!-- FEATURES (DA3M ONLY) -->
  <section class="py-20 px-6 grid grid-cols-1 md:grid-cols-1 gap-8 text-center">

    <div class="p-6 rounded glass">
      <h3 class="text-xl font-bold mb-2">💬 دعم مباشر</h3>
      <p>فريق الدعم متوفر دائماً لمساعدتك</p>

      <a href="https://discord.gg/rcgdEMWHv8"
         class="inline-block mt-4 px-4 py-2 rounded glass hover:bg-white/20 transition">
         دخول سيرفر الدعم
      </a>
    </div>

  </section>

  <!-- FOOTER -->
  <footer class="p-6 text-center glass mt-10">
    <p>© 2026 7nax7na System</p>
  </footer>

</body>
</html>
