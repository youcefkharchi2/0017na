<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - 7nax7na System</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Video Background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Glass effect */
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
  </style>
</head>

<body class="text-white">

  <!-- VIDEO BACKGROUND -->
  <video autoplay muted loop playsinline class="video-bg">
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- LOGIN BOX -->
  <div class="glass p-10 rounded-xl shadow-lg w-full max-w-md text-center">
    <h2 class="text-3xl font-bold mb-6">تسجيل الدخول</h2>

    <!-- زر Discord OAuth2 -->
    <a href="https://discord.com/api/oauth2/authorize?client_id=1486022873821876224&redirect_uri=https%3A%2F%2Fyourwebsite.com%2Fredirect&response_type=code&scope=identify"
       class="px-8 py-4 text-lg rounded glass hover:bg-white/20 transition inline-block">
       تسجيل الدخول عبر Discord
    </a>
  </div>

</body>
</html>
